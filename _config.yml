main_title: "Flo's Food and Drink"
description: "Flo's Recipes and Wine we like"

# Conversion
highlighter: rouge
excerpt_separator: "{{ more }}"
markdown_ext: markdown,mkd,mkdn,md
markdown: kramdown
#markdown: redcarpet
redcarpet:
  extensions: [strikethrough, tables]

sass:
  sass_dir: public/css
  style: :compressed

# Serving
port: 4000
host: 0.0.0.0
url:
baseurl: "" # does not include hostname
permalink: /:title

# Where things are
source:      .
destination_dir: ./_site
plugins_dir:     ./_plugins
layouts_dir:     ./_layouts
data_dir: ./_data
#collections: null // this seems to break my sites

#Handling Reading
safe: false





